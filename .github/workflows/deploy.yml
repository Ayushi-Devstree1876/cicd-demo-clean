name: CICD CLEAN DEMO

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy EC2
        uses: appleboy/ssh-action@master
        with:
          host: 3.7.55.203
          username: ubuntu
          key: ${{ secrets.EC2_Server }}
          script: |
            ~/deploy-demo.sh
